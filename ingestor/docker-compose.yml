version: "3.9"

services:
    timescaledb:
        image: timescale/timescaledb:latest-pg16
        container_name: timescaledb
        restart: unless-stopped
        environment:
            POSTGRES_USER: ${DB_USER}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
        volumes:
            - timescaledb-data:/var/lib/postgresql/data
        ports:
            - "5432:5432"
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d postgres"]
            interval: 5s
            timeout: 5s
            retries: 10

    ingestor:
        build:
            context: ..
            dockerfile: ingestor/Dockerfile
        image: ingestor
        container_name: ingestor
        network_mode: host
        restart: unless-stopped
        stdin_open: true
        tty: true
        depends_on:
            timescaledb:
                condition: service_healthy
        env_file:
            - .env
        volumes:
            - ./servers.json:/app/ingestor/servers.json:ro,Z
            - ./settings.json:/app/ingestor/settings.json:ro,Z
            - ./tags:/app/ingestor/tags:ro,Z
            - ./certs:/app/ingestor/certs:Z
            - ./logs:/app/ingestor/logs

volumes:
    timescaledb-data:
