apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ingestor-certs
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestor
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: ingestor
      app.kubernetes.io/part-of: kepserverlogger
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ingestor
        app.kubernetes.io/part-of: kepserverlogger
    spec:
      imagePullSecrets:
        - name: kepserverlogger-registry
      initContainers:
        - name: wait-for-timescaledb
          image: timescale/timescaledb:latest-pg16
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - until pg_isready -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER" -d "$DB_NAME"; do sleep 2; done
          envFrom:
            - configMapRef:
                name: kepserverlogger-env
            - secretRef:
                name: kepserverlogger-secret
      containers:
        - name: ingestor
          image: ingestors
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: kepserverlogger-env
            - secretRef:
                name: kepserverlogger-secret
          volumeMounts:
            - name: config
              mountPath: /app/ingestors/settings.json
              subPath: settings.json
              readOnly: true
            - name: config
              mountPath: /app/ingestors/TagList.csv
              subPath: TagList.csv
              readOnly: true
            - name: certs
              mountPath: /app/certs
            - name: logs
              mountPath: /app/ingestors/logs
      volumes:
        - name: config
          configMap:
            name: kepserverlogger-files
        - name: certs
          persistentVolumeClaim:
            claimName: ingestor-certs
        - name: logs
          emptyDir: {}
